name: Ruff

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v1
      with:
        version: "latest"

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: UV_GIT_LFS=1 uv sync --dev

    - name: Check code formatting
      run: uv run ruff format --check --diff .
      id: ruff-format
      continue-on-error: true

    - name: Lint code
      run: uv run ruff check --output-format=github .
      id: ruff-check
      continue-on-error: true

    - name: Report ruff errors
      if: steps.ruff-check.outcome == 'failure' || steps.ruff-format.outcome == 'failure'
      run: |
        echo "::error::Ruff checks failed. Please run 'make fix' locally to automatically fix formatting and linting issues."
        exit 1 